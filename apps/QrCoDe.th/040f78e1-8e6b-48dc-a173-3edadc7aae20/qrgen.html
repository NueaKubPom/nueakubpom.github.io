<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR Generator X NKPNT</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet" />
  <!-- Main Theme -->
  <link rel="stylesheet" href="../../../style.css" />
  <!-- App Specific Overrides -->
  <link rel="stylesheet" href="qrgen.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <!-- Favicon -->
  <link rel="icon" href="../../../NKP-NT Studio Logo.png" type="image/png">
</head>

<body>
  <div class="container">
    <!-- Back Link -->
    <a href="../../../index.html" class="button-link" style="align-self: flex-start; margin-bottom: 10px;">
      <i class="fa-solid fa-arrow-left"></i> กลับหน้าหลัก
    </a>

    <!-- Logo & Branding -->
    <img src="../../../NKP-NT Studio Logo.png" alt="NKP-NT Studio Logo" class="site-logo-img">
    <h1 class="brand-title">
      <span class="main-brand">QR Generator</span>
      <span class="typing-container" id="typing-text"></span>
    </h1>

    <!-- ===== ส่วนกรอกข้อมูล ===== -->
    <div id="text-input-area">
      <textarea id="qrText" placeholder="ข้อความหรือลิงก์..."></textarea>
    </div>

    <div id="wifi-input-area" style="display: none;">
      <label>ชื่อเครือข่าย (SSID):</label>
      <input type="text" id="wifiSSID" placeholder="ชื่อ WiFi ของคุณ" />
      <label>รหัสผ่าน:</label>
      <input type="text" id="wifiPass" placeholder="รหัสผ่าน WiFi" />
      <label>ประเภทการเข้ารหัส:</label>
      <select id="wifiEnc">
        <option value="WPA" selected>WPA/WPA2</option>
        <option value="WEP">WEP</option>
        <option value="nopass">ไม่มีรหัสผ่าน (เปิด)</option>
      </select>
    </div>

    <label>ประเภทข้อมูล:</label>
    <select id="dataType">
      <option value="text">ข้อความทั่วไป</option>
      <option value="url">URL</option>
      <option value="email">อีเมล</option>
      <option value="phone">เบอร์โทรศัพท์</option>
      <option value="line">LINE ID</option>
      <option value="wifi">WiFi</option>
    </select>

    <label>ชื่อไฟล์:</label>
    <input type="text" id="filename" placeholder="ชื่อไฟล์ เช่น my-qr" />

    <!-- ===== รูปแบบจุด ===== -->
    <details>
      <summary>🎨 รูปแบบจุด & กรอบ</summary>
      <div class="option-group">
        <label>รูปแบบจุด:</label>
        <select id="dotStyle">
          <option value="square">square</option>
          <option value="dots">dots</option>
          <option value="rounded">rounded</option>
          <option value="classy">classy</option>
          <option value="classy-rounded">classy-rounded</option>
          <option value="extra-rounded">extra-rounded</option>
        </select>

        <label>รูปแบบกรอบ (ตา):</label>
        <select id="cornerSquareStyle">
          <option value="square" selected>Square</option>
          <option value="extra-rounded">Extra Rounded</option>
          <option value="dot">Dot</option>
        </select>

        <label>รูปแบบจุด (ในตา):</label>
        <select id="cornerDotStyle">
          <option value="square" selected>Square</option>
          <option value="dot">Dot</option>
        </select>
      </div>
    </details>

    <!-- ===== สีจุด ===== -->
    <details>
      <summary>🖌️ สีจุด (และสีตา)</summary>
      <div class="option-group">
        <label>ประเภทสีจุด (และสีตา):</label>
        <select id="dotColorType">
          <option value="solid" selected>สีทึบ</option>
          <option value="gradient">ไล่สี (Gradient)</option>
        </select>

        <label>สีจุด 1:</label>
        <input type="color" id="dotColor1" value="#000000" />

        <div id="dotGradientOptions" style="display:none;">
          <label>สีจุด 2:</label>
          <input type="color" id="dotColor2" value="#ff0000" />
          <label>ประเภทการไล่สี (จุด):</label>
          <select id="dotGradientType">
            <option value="linear">เส้นตรง (Linear)</option>
            <option value="radial">วงกลม (Radial)</option>
          </select>
          <label>องศาการหมุน (จุด):</label>
          <input type="number" id="dotGradientRotation" value="0" min="0" max="360" />
        </div>
      </div>
    </details>

    <!-- ===== พื้นหลัง ===== -->
    <details>
      <summary>🎆 พื้นหลัง QR</summary>
      <div class="option-group">
        <label>ประเภทพื้นหลัง:</label>
        <select id="bgType">
          <option value="solid" selected>สีทึบ</option>
          <option value="gradient">ไล่สี (Gradient)</option>
          <option value="transparent">โปร่งใส (Transparent)</option>
        </select>

        <div id="bgColorOptions">
          <label>สีพื้นหลัง 1:</label>
          <input type="color" id="bgColor1" value="#ffffff" />
        </div>

        <div id="bgGradientOptions" style="display:none;">
          <label>สีพื้นหลัง 2:</label>
          <input type="color" id="bgColor2" value="#eeeeff" />
          <label>ประเภทการไล่สี (พื้นหลัง):</label>
          <select id="bgGradientType">
            <option value="linear">เส้นตรง (Linear)</option>
            <option value="radial">วงกลม (Radial)</option>
          </select>
          <label>องศาการหมุน (พื้นหลัง):</label>
          <input type="number" id="bgGradientRotation" value="0" min="0" max="360" />
        </div>
      </div>
    </details>

    <!-- ===== โลโก้ & ตั้งค่า ===== -->
    <details>
      <summary>⚙️ โลโก้ & ตั้งค่าขั้นสูง</summary>
      <div class="option-group">
        <label>โลโก้ (ไม่บังคับ):</label>
        <input type="file" id="logoInput" accept="image/*" />

        <label>ระดับการซ่อมแซม (Error Correction):</label>
        <select id="errorCorrection">
          <option value="L">L - ต่ำ</option>
          <option value="M">M - ปานกลาง</option>
          <option value="Q">Q - สูง</option>
          <option value="H" selected>H - สูงสุด</option>
        </select>

        <label>ความละเอียด (typeNumber):</label>
        <input type="number" id="typeNumber" min="1" max="40" value="10" />

        <label>ขนาด QR (px):</label>
        <input type="number" id="qrSize" min="100" max="1000" value="400" />

        <label>ระยะห่างขอบ (Padding):</label>
        <input type="range" id="qrMargin" min="0" max="50" value="10" step="1" title="ระยะห่างขอบ" />
      </div>
    </details>

    <!-- ===== ปุ่ม ===== -->
    <div class="action-buttons">
      <button onclick="generateQR()" class="button-link">✨ สร้าง QR</button>
      <button onclick="downloadQR()" class="button-link btn-download">📥 ดาวน์โหลด</button>
    </div>

    <!-- ===== QR Preview ===== -->
    <div id="qr-code" class="qr-preview"></div>

  </div>

  <div class="footer">
    <p>&copy; 2024-<span id="current-year"></span> NueaKubPom. All Rights Reserved. <br> Designed for Excellence.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  <script src="qrgen.js"></script>
</body>

</html>
